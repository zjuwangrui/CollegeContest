; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter, extra scripting
;   Upload options: custom port, speed and extra flags
;   Library options: dependencies, extra library storages
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:STM32F103VE]
platform = ststm32
framework = stm32cube
board = genericSTM32F103VE
debug_tool = stlink
upload_protocol = stlink
monitor_speed = 115200
monitor_port  = COM3        ; 改成设备管理器里实际的 COM 号
build_flags   = -Wl,-u,_printf_float           ; 开启 newlib-nano 浮点 printf
                -DHAL_SRAM_MODULE_ENABLED       ; 启用 FSMC/SRAM HAL（LCD 驱动需要）
                -DARM_MATH_CM3                  ; CMSIS-DSP for Cortex-M3
                -Iinclude                       ; 让 "bsp/xxx.h" 等前缀路径生效
lib_deps      = CMSIS-DSP  ; FFT/THD 依赖，pio pkg install 会拉
extra_scripts = pre:export_hex.py